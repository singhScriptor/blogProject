<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blog_Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <form id ="form">
        <div class="main-header">
            <h1>Create a New Blog Post</h1>
        </div>
        <div class = "blog-details">
            <label for="blog">Blog Title:</label><br>
            <input type="text" name="blog" id ="blog" class="blog"required><br>
            <label for="author">Blog Author:</label><br>
            <input type="text" name="author" id="author" class="author" required><br>
            <label for="content">Blog Content:</label><br>
            <textarea name="content" id="content" class="content" required></textarea>
        </div>
        <div class="button">
            <button type="submit" id="submit" class="submit">
                Submit
            </button>
        </div>
    </form>
    <aside class="result">
        <ul class="userlist" id="userlist">

        </ul>
    </aside>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</body>
</html>
